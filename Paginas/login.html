<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre na Sua Conta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/TelaLogin.css">
    <link rel="shortcut icon" href="../PanelaQuenteFavicon/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/darkmode.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <header class="cadastro">
        <a href="../index.html"><img src="../imagens/PanelaQuenteLogo.png" alt="" class="imagem"></a>
    </header>


    <div class="tela-login">
        <div class="login-card">
            <h2 class="titulo-login">
                Seja Bem Vindo(a) ao Panela Quente
            </h2>
            <form>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Digite Seu login" id="LoginAcesso">
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-lock"></i>
                    </span>

                    <input type="password" class="form-control" placeholder="Digite Sua Senha" id="SenhaAcesso">
                </div>
                <button type="submit" class="btn-login">ENVIAR</button>
                <p class="ou">OU</p>
                <a href="Cadastro.html" class="criar-conta">CRIAR CONTA</a>
            </form>
        </div>
    </div>

    



    <footer class="d-flex justify-content-between align-items-center py-3 px-4 ">
        <span>© 2026 Panela Quente</span>
        <div class="d-flex gap-3">
            <a href="https://github.com/JoaoGuiMatta"><i class="bi bi-github"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a> 
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
