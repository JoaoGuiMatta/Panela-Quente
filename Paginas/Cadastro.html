<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crie a Sua Conta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../css/TelaCadastro.css" />
    <link rel="shortcut icon" href="../PanelaQuenteFavicon/favicon.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/darkmode.css">
  </head>

  <body>
    <header class="cadastro">
      <a href="../index.html"
        ><img src="../imagens/PanelaQuenteLogo.png" alt="" class="imagem"
      /></a>
    </header>

    <div class="tela-cadastro">
      <div class="cadastro-card">
        <div class="titulo">
          <h1>Cadastre-se</h1>
          <h4>E crie suas receitas</h4>
        </div>

        <form>
          <div class="Etapas" id="Etapa1">

            <div class="mb-3">
              <label class="form-label"> Nome Completo </label>
              <input type="text" class="form-control" placeholder="Digite seu nome completo" maxlength="60" id="NomeUsuario" required/>
            </div>
            
            <div class="mb-3">
              <label class="form-label"> Nome Materno </label>
              <input type="text" class="form-control" placeholder="Digite o nome materno" maxlength="60" id="NomeMae" required/>
            </div>

            <div class="mb-3">
              <label class="form-label"> Data de Nascimento </label>
              <input type="date" class="form-control" id="Nasc" required/>
            </div>

            <div class="mb-3">
              <label class="form-label"> Sexo </label>
              <select class="form-select" id="Sexo" required>
                <option>Selecione</option>
                <option>Masculino</option>
                <option>Feminino</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label class="form-label"> CPF </label>
              <input type="text" class="form-control" placeholder="Digite seu CPF" maxlength="14" id="Cpf" required/>
            </div>

            <div class="mb-3">
              <label class="form-label"> Telefone Celular </label>
              <input type="text" class="form-control" placeholder="(+55)XX-XXXXXXXXX" maxlength="12" id="Cel" required/>
            </div>
            <div class="mb-3">
              <label class="form-label"> Telefone Fixo </label>
              <input type="text" class="form-control" placeholder="(+55)XX-XXXXXXXX" maxlength="11" id="Tel"/>
            </div>
            <button class="Avançar" onclick="Avançar(2)">Avançar &rarr;</button>
          </div>


          
          <!-- Div endereço -->
          <div class="Etapas" id="Etapa2" style="display: none;">
            <div class="endereco">

              <div class="row">
                <div class="col-md-3">
                      <div class="mb-3">
                          <label class="form-label">CEP</label>
                          <input type="text" class="form-control" id="Cep" placeholder="00000-000"/>
                      </div>
                  </div>

                  <div class="col-md-6">
                      <div class="mb-3">
                          <label class="form-label">Logradouro</label>
                          <input type="text" class="form-control" id="Logradouro"/>
                      </div>
                  </div>

                  <div class="col-md-3">
                      <div class="mb-3">
                          <label class="form-label">Número</label>
                          <input type="text" class="form-control" id="Numero" placeholder="Nº"/>
                      </div>
                  </div>
              </div>

              <div class="row">
                  <div class="col-md-4">
                      <div class="mb-3">
                          <label class="form-label">Bairro</label>
                          <input type="text" class="form-control" id="Bairro"/>
                      </div>
                  </div>

                  <div class="col-md-5">
                      <div class="mb-3">
                          <label class="form-label">Cidade</label>
                          <input type="text" class="form-control" id="Cidade"/>
                      </div>
                  </div>

                  <div class="col-md-3">
                      <div class="mb-3">
                          <label class="form-label">UF</label>
                          <input type="text" class="form-control" id="Estado" placeholder="UF"/>
                      </div>
                  </div>
              </div>
            </div>
            <button class="Avançar" onclick="Avançar(2)">Avançar &rarr;</button>
            <button class="Avançar" onclick="Voltar(1)">← Voltar</button>
          </div>
          <!-- fim Div endereço -->
          
          <div class="Etapas" id="Etapa3" style="display: none;">

            <div class="mb-3">
              <label class="form-label"> Login </label>
              <input type="text" class="form-control" placeholder="O seu login deve conter 6 caracteres alfabéticos" maxlength="6" id="LoginCad" required/>
            </div>
            <div class="mb-3">
              <label class="form-label"> Senha </label>
              <input type="password" class="form-control" placeholder="A sua senha deve conter 8 caracteres alfabéticos" maxlength="6" id="SenhaCad" required/>
            </div>
            <div class="mb-3">
              <label class="form-label"> Confirmar Senha </label>
              <input type="password" class="form-control" placeholder="Confirme sua senha" id="ConfirmarSenha" required/>
            </div>
            <button type="submit" class="btn-cadastrar">Cadastrar</button>
            <button onclick="Voltar(2)">&larr; Voltar</button>
          </div>
          <p class="LinkLogin">Já possui conta? <a href="login.html">FAZER LOGIN</a></p>
        </form>
      </div>
    </div>

        <footer class="d-flex justify-content-between align-items-center py-3 px-4">
            <span>© 2026
                 Panela Quente</span>
            <div class="d-flex gap-3">
            <a href="https://github.com/JoaoGuiMatta"><i class="bi bi-github"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a>
        </div>
    </footer>
  </body>
</html>
