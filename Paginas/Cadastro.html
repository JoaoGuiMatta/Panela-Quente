<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre a Sua Conta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/TelaCadastro.css">
    <link rel="shortcut icon" href="../PanelaQuenteFavicon/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>

</head>

<body>

    <header class="cadastro">
        <a href="../index.html"><img src="../imagens/PanelaQuenteLogo.png" alt="" class="imagem"></a>
    </header>

        <div class="tela-cadastro">

    <div class="cadastro-card">

        <div class="titulo">
            <h1>Cadastre-se</h1>
            <h4>E veja deliciosas receitas</h4>
        </div>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Nome Completo
                </label>

                <input type="text" class="form-control" placeholder="Digite seu nome completo">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Data de Nascimento
                </label>

                <input type="date" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Sexo
                </label>
                <select class="form-select">
                    <option>Selecione</option>
                    <option>Masculino</option>
                    <option>Feminino</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Nome Materno
                </label>
                <input type="text" class="form-control" placeholder="Digite o nome materno">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    CPF
                </label>
                <input type="text" class="form-control" placeholder="Digite seu CPF">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Telefone Celular
                </label>
                <input type="text" class="form-control" placeholder="(+55)XX-XXXXXXXXX">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Telefone Fixo
                </label>

                <input type="text" class="form-control" placeholder="(+55)XX-XXXXXXXXX">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Endereço Completo
                </label>
                <input type="text" class="form-control" placeholder="Digite seu endereço">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Login
                </label>
                <input type="text" class="form-control" placeholder="Crie um login">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Senha
                </label>
                <input type="password" class="form-control" placeholder="Crie uma senha">
            </div>
            <div class="mb-3">
                <label class="form-label">
                    Confirmar Senha
                </label>
                <input type="password" class="form-control" placeholder="Confirme sua senha">
            </div>
            <button type="submit" class="btn-cadastrar">
                Cadastrar
            </button>
        </form>
    </div>
</div>

   <footer class="d-flex justify-content-between align-items-center py-3 px-4 border-top">
        <span>© 2025 Panela Quente</span>
        <div class="d-flex gap-3">
            <a href="https://github.com/JoaoGuiMatta"><i class="bi bi-github"></i></a>
            <a href="#"><i class="bi bi-facebook"></i></a>
        </div>
    </footer>
</body>
</html>
