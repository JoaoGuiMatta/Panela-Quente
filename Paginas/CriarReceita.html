<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crie o seu prato</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../css/TelaCadastro.css" />
    <link
      rel="shortcut icon"
      href="../PanelaQuenteFavicon/favicon.ico"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="../css/darkmode.css" />
  </head>

  <body>
    <header>
      <a href="../index.html" class="logo"
        ><img src="../imagens/PanelaQuenteLogo.png" alt="Logo.png" id="Logo"
      /></a>

      <i id="Burguer" class="bi bi-list" onclick="ClickMenu()"></i>
      <nav id="MenuHamburguer">
        <!--Menu hamburguer-->

        <div class="MenuHeader">
          <div class="menus">
            <a href="../index.html" class="receitas">Receitas</a>
            <div class="submenu">
              <a href="../Paginas/Manha.html">Café da Manhã</a>
              <a href="../Paginas/Almoco.html">Almoço/janta</a>
              <a href="../Paginas/Tarde.html">Café da Tarde</a>
            </div>
          </div>
          <a href="../Paginas/CriarReceita.html">Crie a Sua</a>
          <a href="../Paginas/Sugestão.html">Sugestão do Dia</a>
        </div>
      </nav>

      <div class="DarkButton" onclick="Darkmode()">
        <i class="bi bi-moon"></i>
      </div>

      <div class="entrar">
        <a href="../Paginas/login.html">Entrar</a>
      </div>
    </header>

    <div class="tela-cadastro">
      <div class="cadastro-card">
        <div class="titulo">
          <h1>Crie a sua receita</h1>
          <h4>E quem sabe outras pessoas prefiram a sua à receita de vó</h4>
        </div>

        <form>
          <div class="mb-3">
            <label class="form-label">Nome da receita</label>
            <input
              type="text"
              class="form-control"
              placeholder="Nome do prato"
              id="NomeReceita"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Descrição do prato</label>
            <input
              type="text"
              class="form-control"
              placeholder="Digite a descrição"
              id="Descricao"
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Ingredientes</label>
            <textarea
              class="form-control"
              id="Ingredientes"
              rows="5"
              placeholder="Digite um ingrediente por linha&#10;Ex:&#10;2 ovos&#10;1 xícara de farinha&#10;Sal a gosto"
            ></textarea>
            <small class="form-text text-muted"
              >Digite um ingrediente por linha</small
            >
          </div>

          <div class="mb-3">
            <label class="form-label">Estimativa de tempo de preparo</label>
            <input
              type="number"
              class="form-control"
              placeholder="Ex: 30min"
              min="1"
              id="TempoReceita"
            />
            <small class="form-text text-muted">
              Digite em minutos. Ex: 1h = 60min, 1h30 = 90min
            </small>
          </div>

          <div class="mb-3">
            <label class="form-label">Modo de preparo</label>
            <div class="d-flex gap-2">
              <input
                type="text"
                class="form-control"
                id="Passo"
                placeholder="Digite um passo"
              />

              <button type="button" onclick="adicionarPasso()">+</button>
            </div>
            <ol id="ListaPasso"></ol>
          </div>

          <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select" id="Categoria">
              <option selected disabled hidden>Escolha uma Categoria</option>
              <option>Café da Manhã</option>
              <option>Almoço/Janta</option>
              <option>Café da Tarde</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Foto do prato</label>
            <input type="file" accept="image/*" id="Foto" />
          </div>

          <button type="submit" class="btn-cadastrar">Enviar receita</button>
        </form>
      </div>
    </div>

    <footer class="d-flex justify-content-between align-items-center py-3 px-4">
      <span>© 2026 Panela Quente</span>
      <div class="d-flex gap-3" id="RedesSociais">
        <a href="https://github.com/JoaoGuiMatta" target="_blank"
          ><i class="bi bi-github"></i
        ></a>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank"
          ><i class="bi bi-youtube"></i
        ></a>
      </div>
    </footer>

    <script src="../JavaScript/CriarReceita.js"></script>
    <script src="../srcipt.js"></script>
    <script src="../JavaScript/DarkMode.js"></script>
    <script src="../JavaScript/MenuHamburguer.js"></script>
  </body>
</html>
