<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panela Quente - Receita</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
    <link rel="stylesheet" href="../style.css"/>
    <link rel="stylesheet" href="../css/receitas.css"/>
    <link rel="shortcut icon" href="../PanelaQuenteFavicon/favicon.ico" type="image/x-icon"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/darkmode.css"/>
  </head>
  <body>

    <header>
      <a href="../index.html" class="logo">
        <img src="../imagens/PanelaQuenteLogo.png" alt="Logo.png" id="Logo"/>
      </a>

      <i id="Burguer" class="bi bi-list" onclick="ClickMenu()"></i>
      <nav id="MenuHamburguer">
        <div class="MenuHeader">
          <div class="menus">
            <a href="../index.html" class="receitas">Receitas</a>
            <div class="submenu">
              <a href="../Paginas/Manha.html">Café da Manhã</a>
              <a href="../Paginas/Almoco.html">Almoço/janta</a>
              <a href="../Paginas/Tarde.html">Café da Tarde</a>
            </div>
          </div>
          <a href="../Paginas/CriarReceita.html">Crie a Sua</a>
          <a href="#" onclick="ReceitaAleatoria()">Sugestão do Dia</a>
        </div>
      </nav>

      <div class="DarkButton" onclick="Darkmode()">
        <i class="bi bi-moon"></i>
      </div>

      <div class="entrar">
        <a href="../Paginas/login.html">Entrar</a>
      </div>
    </header>

    <!-- CONTEÚDO DINÂMICO — preenchido pelo JS -->
    <h1 id="NomeReceita">Carregando...</h1>
    <h5 id="DescricaoReceita"></h5>

    <div class="elementos">
      <h4>
        <img src="../icons/Cronometro.svg" alt="Cronometro" class="Cronometro"/>: 
        <span id="TempoReceita"></span>
      </h4>
    </div>

    <!-- foto se tiver -->
    <div id="FotoContainer" style="text-align:center; margin: 20px auto; max-width: 500px; display:none;">
      <img id="FotoReceita" src="" alt="Foto da receita" style="width:100%; border-radius: 15px;"/>
    </div>

    <div class="conteudo-receita">
      <ul class="ingredientes" id="ListaIngredientes">
        <!-- preenchido pelo JS -->
      </ul>

      <div class="preparo-wrap">
        <ol class="preparo" id="ListaPreparo">
          <!-- preenchido pelo JS -->
        </ol>
      </div>
    </div>

    <footer class="d-flex justify-content-between align-items-center py-3 px-4">
      <span>© 2026 Panela Quente</span>
      <div class="d-flex gap-3" id="RedesSociais">
        <a href="https://github.com/JoaoGuiMatta" target="_blank"><i class="bi bi-github"></i></a>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank"><i class="bi bi-youtube"></i></a>
        <a href="#"><i class="bi bi-facebook"></i></a>
      </div>
    </footer>

    <script src="../srcipt.js"></script>
    <script src="../JavaScript/DarkMode.js"></script>
    <script src="../JavaScript/MenuHamburguer.js"></script>
    <script src="../JavaScript/ReceitaAleatoria.js"></script>
    <script src="../JavaScript/ExibirReceita.js"></script>

  </body>
</html>
